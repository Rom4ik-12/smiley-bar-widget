name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build .qsmod
        run: zip smiley-bar-widget.qsmod module.json main.qml Smiley.qml

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: smiley-bar-widget.qsmod
          draft: false
